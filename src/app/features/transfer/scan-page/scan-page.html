<section class="page-shell">
  <app-page-header
    kicker="Transferências"
    title="Scanner de QR"
  >
    <a class="button button--ghost" pageHeaderActions routerLink="/transfer/key">
      Voltar à chave
    </a>
  </app-page-header>

  @if (errorMessage()) {
    <div class="alert alert--error" aria-live="polite">
      <p>{{ errorMessage() }}</p>
    </div>
  }

  <section class="transfer-scan-layout">
    <app-qr-scanner
      description="Aponte para um QR de conta ou cobrança."
      title="Ler QR com a câmera"
      (closeRequested)="closeScanner()"
      (scanned)="handleScannedKey($event)"
    />

    <aside class="transfer-scan-summary surface-card">
      <span class="section-kicker">Manual</span>
      <h2 class="section-title">Digite a chave</h2>

      <a class="button button--secondary button--block" routerLink="/transfer/key">
        Digitar chave manualmente
      </a>
    </aside>
  </section>
</section>
