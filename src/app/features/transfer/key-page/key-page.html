<section class="page-shell">
  <app-page-header
    kicker="Transferências"
    title="Transferir"
  >
    <a class="button button--ghost" pageHeaderActions routerLink="/transfer">Voltar ao extrato</a>
  </app-page-header>

  <section class="transfer-key-layout">
    <form class="transfer-key-form surface-card" (submit)="submit($event)" novalidate>
      <div class="transfer-key-form__copy">
        <span class="section-kicker">Chave</span>
        <h2 class="section-title">Informe e-mail, link ou cobrança</h2>
      </div>

      @if (errorMessage()) {
        <div class="alert alert--error" aria-live="polite">
          <p>{{ errorMessage() }}</p>
        </div>
      }

      <app-input
        autocomplete="off"
        hint="Aceita e-mail, link do app ou identificador de cobrança."
        label="Chave de transferência"
        name="key"
        placeholder="maria@empresa.com"
        [formField]="transferKeyForm.key"
      />

      <div class="action-row">
        <button class="button button--primary" type="submit">Continuar</button>
        <a class="button button--secondary" routerLink="/transfer/scan">Abrir scanner</a>
      </div>
    </form>
  </section>
</section>
