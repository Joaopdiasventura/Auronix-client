<section class="auth-shell">
  <div class="auth-panel surface-card">
    <div class="auth-brand">
      <span class="auth-brand__mark">
        <img alt="Auronix" height="40" ngSrc="/icon.svg" priority width="38" />
      </span>

      <div class="auth-brand__copy">
        <strong>Auronix Bank</strong>
        <span>Acesso seguro</span>
      </div>
    </div>

    <div class="auth-copy">
      <span class="section-kicker">Entrar</span>
      <h1>Acesse sua conta</h1>
    </div>

    <form class="auth-form" (submit)="submit($event)" novalidate>
      @if (errorMessage()) {
        <div class="alert alert--error" aria-live="polite">
          <p>{{ errorMessage() }}</p>
        </div>
      }

      <app-input
        autocomplete="email"
        inputMode="email"
        label="E-mail"
        name="email"
        placeholder="voce@empresa.com"
        type="email"
        [formField]="loginUserForm.email"
      />

      <app-input
        autocomplete="current-password"
        label="Senha"
        name="password"
        placeholder="Digite sua senha"
        type="password"
        [formField]="loginUserForm.password"
      />

      <button class="button button--primary button--block" type="submit" [disabled]="isLoading()">
        @if (isLoading()) {
          <span class="button__spinner" aria-hidden="true"></span>
        }
        {{ isLoading() ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <p class="auth-footer">
      Ainda não tem acesso?
      <a routerLink="/user/create">Criar conta</a>
    </p>
  </div>
</section>
