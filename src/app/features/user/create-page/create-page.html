<section class="auth-shell">
  <div class="auth-panel surface-card">
    <div class="auth-brand">
      <span class="auth-brand__mark">
        <img alt="Auronix" height="40" ngSrc="/icon.svg" priority width="38" />
      </span>

      <div class="auth-brand__copy">
        <strong>Auronix Bank</strong>
        <span>Nova conta</span>
      </div>
    </div>

    <div class="auth-copy">
      <span class="section-kicker">Cadastro</span>
      <h1>Abra sua conta digital</h1>
    </div>

    <form class="auth-form" (submit)="submit($event)" novalidate>
      @if (errorMessage()) {
        <div class="alert alert--error" aria-live="polite">
          <p>{{ errorMessage() }}</p>
        </div>
      }

      <app-input
        autocomplete="name"
        label="Nome completo"
        name="name"
        placeholder="Como a conta será identificada"
        [formField]="createUserForm.name"
      />

      <app-input
        autocomplete="email"
        inputMode="email"
        label="E-mail"
        name="email"
        placeholder="voce@empresa.com"
        type="email"
        [formField]="createUserForm.email"
      />

      <app-input
        autocomplete="new-password"
        hint="Use ao menos 8 caracteres, com letra maiúscula, minúscula, número e símbolo."
        label="Senha"
        name="password"
        placeholder="Crie uma senha forte"
        type="password"
        [formField]="createUserForm.password"
      />

      <button class="button button--primary button--block" type="submit" [disabled]="isLoading()">
        @if (isLoading()) {
          <span class="button__spinner" aria-hidden="true"></span>
        }
        {{ isLoading() ? 'Criando conta...' : 'Criar conta' }}
      </button>
    </form>

    <p class="auth-footer">
      Já possui acesso?
      <a routerLink="/user/login">Entrar agora</a>
    </p>
  </div>
</section>
